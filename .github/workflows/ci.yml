name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-desktop.txt
          python -m pip install -r requirements-packaging.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile Python files
        shell: bash
        run: |
          python -m py_compile desktop_qt_app.py desktop_tool.py dashdesign_worker.py app_runtime.py ui/*.py ui/pages/*.py ui/widgets/*.py scripts/*.py

      - name: Run unit tests
        shell: bash
        run: |
          python -m pytest tests/ -q

      - name: Validate desktop command wiring
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          from pathlib import Path
          from PySide6.QtCore import QTimer
          from desktop_qt_app import DashDesignQtApp, create_application

          app = create_application([])
          window = DashDesignQtApp()
          window.show()
          window.batch_page.batch_input.setText(str(Path.cwd()))
          cmd, output_dir, env = window.build_batch_command()
          assert "--worker" in cmd, cmd
          assert "batch-style" in cmd, cmd
          assert output_dir.name == "print_ready_desktop_qt"
          assert env == {}
          window.nav.setCurrentRow(1)
          window.t2i_prompt.setPlainText("明亮未来教室，孩子进行 AI 数字艺术创作。")
          cmd, output_dir, env = window.build_current_command()
          assert "text-image" in cmd, cmd
          assert "--baseline" in cmd, cmd
          assert output_dir.name == "text_to_image_print_qt"
          assert env == {}
          QTimer.singleShot(100, app.quit)
          app.exec()
          print("desktop wiring ok")
          PY
